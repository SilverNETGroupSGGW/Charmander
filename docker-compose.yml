name: charmander

services:
  api:
    build:
      context: ./api-dotnet
      dockerfile: Dockerfile
    env_file:
      - ./api-dotnet/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8000
      SERVICE_ACCOUNT_PATH: /app/serviceAccountKey.json
      DATABASE_CONNECTION_STRING: Data Source=/app/data/devices.db
    volumes:
      - ${FIREBASE_KEY_FILE:-./api-dotnet/serviceAccountKey.json}:/app/serviceAccountKey.json:ro
      - api_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  www:
    build:
      context: ./react-test-app
      dockerfile: Dockerfile
      args:
        VITE_BASE_API: /api
    ports:
      - "${WWW_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_data:
