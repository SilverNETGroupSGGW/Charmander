name: charmander-api

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charmander-api-dotnet
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8000
      SERVICE_ACCOUNT_PATH: /app/serviceAccountKey.json
      DATABASE_CONNECTION_STRING: Data Source=/app/data/devices.db
    volumes:
      - ${FIREBASE_KEY_FILE:-./serviceAccountKey.json}:/app/serviceAccountKey.json:ro
      - devices-data:/app/data
    restart: unless-stopped

volumes:
  devices-data:
